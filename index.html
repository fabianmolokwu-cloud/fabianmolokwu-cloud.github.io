<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Test | Revenue Architect</title>
    <style>
        body {
            background: #010101;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            padding: 20px;
        }
        .test-card {
            background: #0a0a0a;
            border: 2px solid #00ff9d;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
        }
        input, textarea, select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            margin: 8px 0 16px 0;
            color: #00ff9d;
            font-family: monospace;
        }
        button {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        button:hover {
            background: #00ff9d;
            color: #000;
        }
        .status {
            margin-top: 16px;
            padding: 10px;
            background: #1a1a1a;
            color: #00ff9d;
            font-size: 12px;
            display: none;
        }
        .error {
            color: #ff5555;
            border-left: 3px solid #ff5555;
        }
        .success {
            color: #00ff9d;
            border-left: 3px solid #00ff9d;
        }
        h2 {
            color: #00ff9d;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <h2>🔐 PROTOCOL INITIATION TEST</h2>
        <p style="color:#888; font-size:12px; margin-bottom:1rem;">Formspree Endpoint: xbdpgrwr | CAPTCHA: DISABLED</p>
        
        <form id="test-form">
            <label>NAME:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
            
            <label>EMAIL:</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
            
            <label>MESSAGE:</label>
            <textarea id="message" name="message" rows="3" placeholder="Test message"></textarea>
            
            <button type="submit" id="submitBtn">[ SUBMIT TEST ]</button>
        </form>
        
        <div id="status" class="status"></div>
        
        <p style="color:#444; font-size:10px; margin-top:1rem; text-align:center;">
            Test endpoint: https://formspree.io/f/xbdpgrwr
        </p>
    </div>

    <script>
        const form = document.getElementById('test-form');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!name || !email) {
                showStatus('Please fill in name and email', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '[ SENDING... ]';
            showStatus('Sending to Formspree...', 'info');
            
            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('message', message || 'Test submission');
            formData.append('_subject', 'Test Submission - Revenue Architect');
            
            try {
                console.log('Sending to:', 'https://formspree.io/f/xbdpgrwr');
                console.log('Data:', {name, email});
                
                const response = await fetch('https://formspree.io/f/xbdpgrwr', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                const responseText = await response.text();
                console.log('Response body:', responseText);
                
                if (response.ok) {
                    showStatus('✓ SUCCESS! Form submitted. Check your email.', 'success');
                    form.reset();
                } else {
                    let errorMsg = `Error ${response.status}: `;
                    try {
                        const errorJson = JSON.parse(responseText);
                        errorMsg += errorJson.error || responseText;
                    } catch {
                        errorMsg += responseText || 'Unknown error';
                    }
                    showStatus(`✗ ${errorMsg}`, 'error');
                }
            } catch (err) {
                console.error('Network error:', err);
                showStatus(`✗ NETWORK ERROR: ${err.message}. Check console for details.`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '[ SUBMIT TEST ]';
            }
        });
        
        function showStatus(msg, type) {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = msg;
            statusDiv.className = `status ${type}`;
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
