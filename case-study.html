    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-glow: #00ff9d;
            --terminal-black: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(0, 255, 157, 0.25);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            background-color: #010101;
            background-image: radial-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #eaeef2;
            font-family: var(--font-sans);
            scroll-behavior: smooth;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 157, 0.02) 0px, rgba(0, 255, 157, 0.02) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 100;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Navigation */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(1, 1, 1, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
            padding: 0.75rem 2rem;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-glow);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo i {
            margin-right: 8px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-glow);
            text-shadow: 0 0 5px var(--accent-glow);
        }

        .nav-cta {
            background: transparent;
            border: 1px solid var(--accent-glow);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
        }

        .nav-cta:hover {
            background: var(--accent-glow);
            color: #000 !important;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--accent-glow);
            cursor: pointer;
            background: none;
            border: none;
        }

        .protocol-header {
            padding: 3rem 0 2rem 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-family: var(--font-mono);
            background: linear-gradient(135deg, #ffffff, var(--accent-glow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subhead {
            color: #888;
            margin-top: 0.5rem;
            border-left: 2px solid var(--accent-glow);
            padding-left: 1rem;
        }

        .case-studies-grid {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            margin: 2rem 0;
        }

        .case-card {
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .case-card:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 20px 35px rgba(0, 255, 157, 0.12);
            transform: translateY(-5px);
        }

        .protocol-name {
            background: rgba(0, 255, 157, 0.05);
            padding: 1rem 1.8rem;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .protocol-name h2 {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            color: var(--accent-glow);
        }

        .protocol-badge {
            font-size: 0.65rem;
            background: rgba(0, 255, 157, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--accent-glow);
        }

        .case-content {
            padding: 1.8rem;
        }

        .focus-area {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .case-metric-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 1px solid #1f1f1f;
        }

        .metric-before, .metric-after {
            flex: 1;
            min-width: 160px;
        }

        .metric-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: var(--font-mono);
            margin: 0.3rem 0;
        }

        .metric-before .metric-value {
            color: #ff5e5e;
            text-decoration: line-through;
            opacity: 0.8;
        }

        .metric-after .metric-value {
            color: var(--accent-glow);
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.4);
            animation: pulseRevenue 2s infinite;
        }

        @keyframes pulseRevenue {
            0% { text-shadow: 0 0 0px rgba(0, 255, 157, 0.3); }
            50% { text-shadow: 0 0 12px rgba(0, 255, 157, 0.8); }
            100% { text-shadow: 0 0 0px rgba(0, 255, 157, 0.3); }
        }

        .bridge-section {
            background: #030303;
            border-left: 3px solid var(--accent-glow);
            padding: 1rem 1.2rem;
            margin: 1rem 0;
            border-radius: 12px;

        .bridge-text {

        }

            font-family: var(--font-mono);
            font-size: 0.7rem;

        .diag-item {

            align-items: center;
            gap: 8px;
            color: #aaa;

        .diag-item i {
            color: var(--accent-glow);

        .diag-value {

        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .menu-toggle { display: block; }
            .nav-links {

                width: 100%;
                flex-direction: column;
                gap: 1rem;
                padding: 1rem 0;
                margin-top: 1rem;
                border-top: 1px solid rgba(0, 255, 157, 0.2);
            }
            .nav-links.show { display: flex; }
            .metric-value { font-size: 1.4rem; }
            .case-metric-grid { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
