<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Initiate the Revenue Architecture protocol. Secure intake gate for high-margin patient pipelines and B2B SaaS growth systems.">
    <title>Initiate Protocol | Fabian Molokwu — Revenue Architect</title>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent-glow: #00ff9d; --font-mono: 'JetBrains Mono', monospace; }
        body { background: #010101; background-image: radial-gradient(rgba(0,255,157,0.03) 1px, transparent 1px); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: var(--font-mono); position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,255,157,0.02) 0px, rgba(0,255,157,0.02) 2px, transparent 2px, transparent 6px); pointer-events: none; z-index: 10; }
        
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(1,1,1,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,255,157,0.2); padding: 0.75rem 2rem; }
        .nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700; color: var(--accent-glow); text-decoration: none; }
        .logo i { margin-right: 8px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #ccc; text-decoration: none; font-family: var(--font-mono); font-size: 0.85rem; transition: all 0.3s ease; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-glow); }
        .nav-cta { border: 1px solid var(--accent-glow); padding: 0.5rem 1.2rem; border-radius: 4px; background: var(--accent-glow); color: #000 !important; }
        .menu-toggle { display: none; font-size: 1.5rem; color: var(--accent-glow); cursor: pointer; background: none; border: none; }
        
        .view-container { width: 100%; max-width: 720px; margin-top: 80px; }
        .terminal-container { background: #050505; border: 2px solid #00ff9d; box-shadow: 0 0 30px rgba(0,255,157,0.25); width: 100%; }
        .terminal-header { background: #00ff9d; color: #000; padding: 10px 20px; font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; background: #00ff9d; border-radius: 50%; box-shadow: 0 0 8px #00ff9d; animation: pulseDot 1.5s infinite; }
        @keyframes pulseDot { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
        .terminal-body { padding: 2rem; }
        
        .field { margin-bottom: 1.5rem; }
        .field label { display: block; color: #00ff9d; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .field input, .field select, .field textarea { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e0e0e0; padding: 12px 14px; font-family: var(--font-mono); font-size: 0.85rem; outline: none; }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: #00ff9d; box-shadow: 0 0 12px rgba(0,255,157,0.2); }
        .initiate-btn { width: 100%; background: transparent; border: 1.5px solid #00ff9d; color: #00ff9d; padding: 14px; font-family: var(--font-mono); font-weight: 700; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
        .initiate-btn:hover:not(:disabled) { background: #00ff9d; color: #000; box-shadow: 0 0 28px #00ff9d; transform: translateY(-2px); }
        .initiate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000f0; backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .decrypt-box { border: 1px solid #00ff9d; padding: 2rem; background: #030303; text-align: center; max-width: 500px; width: 90%; }
        .decrypt-progress { width: 100%; height: 3px; background: #1a2a1a; margin: 1.5rem 0; overflow: hidden; }
        .decrypt-bar { width: 0%; height: 100%; background: #00ff9d; transition: width 0.1s linear; }
        
        .success-screen { background: #050505; border: 2px solid #00ff9d; padding: 2.5rem 2rem; text-align: center; animation: fadeIn 0.5s; }
        .success-title { font-size: clamp(1.5rem,6vw,2.2rem); font-weight: 800; color: #fff; text-shadow: 2px 2px 0px #ff0055, -1px -1px 0px #00ff9d; margin-bottom: 1.5rem; }
        .data-dump { color: #00ff9d; font-size: 0.8rem; margin: 1.5rem 0; line-height: 1.8; text-align: left; background: #0a0a0a; padding: 1.2rem; border-left: 3px solid #00ff9d; }
        .progress-bar-container { width: 100%; height: 6px; background: #1f2a1f; margin: 1.5rem 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #00ff9d; animation: fillProgress 1.5s ease-out forwards; }
        @keyframes fillProgress { to { width: 100%; } }
        .back-btn { background: transparent; border: 1.5px solid #00ff9d; color: #00ff9d; padding: 12px 28px; font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; margin-top: 1rem; }
        .back-btn:hover { background: #00ff9d; color: #000; box-shadow: 0 0 20px #00ff9d; }
        .hidden { display: none; }
        .field-error { border-color: #ff0055 !important; animation: shake 0.3s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) { 
            body { padding: 1rem; } 
            .menu-toggle { display: block; } 
            .nav-links { display: none; width: 100%; flex-direction: column; gap: 1rem; padding: 1rem 0; border-top: 1px solid rgba(0,255,157,0.2); } 
            .nav-links.show { display: flex; } 
            .terminal-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-shield-haltered"></i> REVENUE_ARCHITECT</a>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">HOME</a>
                <a href="case-study.html">CASE STUDIES</a>
                <a href="frameworks.html">FRAMEWORKS</a>
                <a href="initiate.html" class="nav-cta">INITIATE PROTOCOL</a>
            </div>
        </div>
    </nav>

    <div class="view-container" id="appContainer">
        <div id="terminalView">
            <div class="terminal-container">
                <div class="terminal-header">
                    <span class="status-dot"></span> [SYSTEM-ID: REVENUE-ARCHITECT-01] // SECURE ACCESS PORTAL
                </div>
                <div class="terminal-body">
                    <form id="protocol-form">
                        <div class="field">
                            <label>LOG_IDENTITY:</label>
                            <input type="text" id="fullName" name="name" placeholder="FULL_NAME" required>
                        </div>
                        <div class="field">
                            <label>LOG_COMMUNICATION:</label>
                            <input type="email" id="email" name="email" placeholder="CORPORATE_EMAIL" required>
                        </div>
                        <div class="field">
                            <label>TARGET_VERTICAL:</label>
                            <select id="vertical" name="vertical">
                                <option value="B2B_SAAS_ARCHITECTURE">B2B_SAAS_ARCHITECTURE</option>
                                <option value="HIGH_MARGIN_SURGICAL">HIGH_MARGIN_SURGICAL / CLINICAL</option>
                                <option value="HYBRID_CLINIC_TECH">HYBRID_CLINIC_TECH</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>SYSTEM_VULNERABILITY:</label>
                            <textarea id="vulnerability" name="message" rows="2" placeholder="DESCRIBE LEAD DECAY SYMPTOMS"></textarea>
                        </div>
                        
                        <button type="submit" class="initiate-btn" id="executeBtn">
                            [ EXECUTE_PROTOCOL ]
                        </button>
                    </form>
                    
                    <p style="color:#444; font-size:0.6rem; text-align:center; margin-top:1rem;">
                        <i class="fas fa-shield-haltered"></i> SECURE PROTOCOL // ENCRYPTED CHANNEL
                    </p>
                </div>
            </div>
        </div>
        
        <div id="successView" class="hidden">
            <div class="success-screen">
                <h1 class="success-title">PROTOCOL SUCCESSFUL</h1>
                <div class="data-dump" id="dataDump">
                    <p>> HANDSHAKE ESTABLISHED</p>
                    <p>> 72-HOUR NURTURE ENGINE: ACTIVATED</p>
                    <p>> EXPECT FIRST DATA PACKET IN < 4 HOURS</p>
                </div>
                <div class="progress-bar-container"><div class="progress-fill"></div></div>
                <button class="back-btn" id="returnToBaseBtn">[ RETURN_TO_BASE ]</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize EmailJS with your public key
        emailjs.init("ix_ZiRenHLUBxcS6L");
        
        const form = document.getElementById('protocol-form');
        const executeBtn = document.getElementById('executeBtn');
        const terminalView = document.getElementById('terminalView');
        const successView = document.getElementById('successView');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        
        function showDecryptAnimation() {
            return new Promise((resolve) => {
                let overlay = document.createElement('div');
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `
                    <div class="decrypt-box">
                        <div style="color:#00ff9d;margin-bottom:1rem;">⚡ PROTOCOL_AUTHENTICATION</div>
                        <div class="decrypt-progress"><div class="decrypt-bar" id="decryptBar"></div></div>
                        <div id="decryptMsg" style="color:#00ff9d;">HANDSHAKE_INITIATED...</div>
                    </div>
                `;
                document.body.appendChild(overlay);
                let progress = 0;
                let bar = overlay.querySelector('#decryptBar');
                let msg = overlay.querySelector('#decryptMsg');
                let interval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    if (progress >= 100) {
                        clearInterval(interval);
                        bar.style.width = '100%';
                        msg.innerHTML = 'HANDSHAKE_COMPLETE';
                        setTimeout(() => { overlay.remove(); resolve(); }, 600);
                    } else {
                        bar.style.width = progress + '%';
                        if (progress > 50) msg.innerHTML = 'ENCRYPTING_DATA_STREAMS...';
                    }
                }, 85);
            });
        }
        
        function showTerminalError(msg) {
            let div = document.createElement('div');
            div.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff0055;color:#fff;padding:12px 24px;font-family:monospace;font-size:0.75rem;z-index:3000;border-radius:4px;';
            div.innerHTML = `⚠️ ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
        
        function validateForm() {
            let name = fullNameInput.value.trim();
            let email = emailInput.value.trim();
            let isValid = true;
            
            fullNameInput.classList.remove('field-error');
            emailInput.classList.remove('field-error');
            
            if (!name) {
                fullNameInput.classList.add('field-error');
                showTerminalError("ERROR: LOG_IDENTITY field required.");
                isValid = false;
            }
            
            if (!email || !email.includes('@')) {
                emailInput.classList.add('field-error');
                showTerminalError("ERROR: Valid LOG_COMMUNICATION required.");
                isValid = false;
            }
            
            return isValid;
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateForm()) return;
            
            const name = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const vertical = document.getElementById('vertical').options[document.getElementById('vertical').selectedIndex]?.text;
            const message = document.getElementById('vulnerability').value.trim() || "Standard pipeline optimization required";
            const timestamp = new Date().toLocaleString();
            
            executeBtn.disabled = true;
            executeBtn.textContent = '[ PROCESSING... ]';
            
            // Prepare email data
            const templateParams = {
                name: name,
                email: email,
                vertical: vertical,
                message: message,
                timestamp: timestamp
            };
            
            try {
                const response = await emailjs.send('service_p3ocsqe', 'template_tcggxlw', templateParams);
                
                if (response.status === 200) {
                    await showDecryptAnimation();
                    
                    const dataDump = document.getElementById('dataDump');
                    if (dataDump) {
                        dataDump.innerHTML = `
                            <p>> IDENTITY: ${name.toUpperCase()}</p>
                            <p>> COMMUNICATION: ${email.replace(/(.{2})(.*)(@)/, '$1***$3')}</p>
                            <p>> TARGET VERTICAL: ${vertical}</p>
                            <p>> 72-HOUR NURTURE ENGINE: ACTIVATED</p>
                            <p>> ZERO-TRUST INTAKE: DEPLOYED</p>
                            <p>> SECURE HANDSHAKE: ESTABLISHED @ ${timestamp}</p>
                            <p>> EXPECT FIRST DATA PACKET IN < 4 HOURS</p>
                        `;
                    }
                    
                    terminalView.classList.add('hidden');
                    successView.classList.remove('hidden');
                } else {
                    showTerminalError("Submission failed. Please try again.");
                    executeBtn.disabled = false;
                    executeBtn.textContent = '[ EXECUTE_PROTOCOL ]';
                }
            } catch (error) {
                console.error('EmailJS error:', error);
                showTerminalError("Network error. Please check your connection.");
                executeBtn.disabled = false;
                executeBtn.textContent = '[ EXECUTE_PROTOCOL ]';
            }
        });
        
        document.getElementById('returnToBaseBtn')?.addEventListener('click', () => {
            successView.classList.add('hidden');
            terminalView.classList.remove('hidden');
            form.reset();
            executeBtn.disabled = false;
            executeBtn.textContent = '[ EXECUTE_PROTOCOL ]';
        });
        
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if(menuToggle) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
        
        setTimeout(() => fullNameInput.focus(), 300);
    </script>
</body>
    </html>
