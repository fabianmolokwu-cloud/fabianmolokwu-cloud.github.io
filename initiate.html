<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EmailJS Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body style="background: #010101; color: #00ff9d; font-family: monospace; padding: 2rem;">
    <h2>EmailJS Connection Test</h2>
    <button id="testBtn">Test EmailJS</button>
    <div id="result" style="margin-top: 1rem;"></div>

    <script>
        // Initialize with your public key
        emailjs.init("ix_ZiRenHLUBxcS6L");
        
        document.getElementById('testBtn').onclick = async function() {
            document.getElementById('result').innerHTML = 'Sending...';
            
            const templateParams = {
                role: 'Test User',
                email: 'test@test.com',
                bottleneck: 'Test',
                metric: 'Test',
                target: 'Test',
                acv: 'Test',
                timestamp: new Date().toLocaleString()
            };
            
            try {
                const response = await emailjs.send('service_p3ocsqe', 'template_cqtecyv', templateParams);
                console.log('Response:', response);
                document.getElementById('result').innerHTML = '✅ Success! Status: ' + response.status;
                document.getElementById('result').style.color = '#00ff9d';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '❌ Error: ' + error.text;
                document.getElementById('result').style.color = '#ff5555';
            }
        };
    </script>
</body>
</html>
