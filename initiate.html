    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent-glow: #00ff9d; --terminal-black: #0a0a0a; --font-mono: 'JetBrains Mono', monospace; }
        body { background: #010101; background-image: radial-gradient(rgba(0,255,157,0.03) 1px, transparent 1px); background-size: 40px 40px; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: var(--font-mono); position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,255,157,0.02) 0px, rgba(0,255,157,0.02) 2px, transparent 2px, transparent 6px); pointer-events: none; z-index: 10; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(1,1,1,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,255,157,0.2); padding: 0.75rem 2rem; }
        .nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700; color: var(--accent-glow); text-decoration: none; }
        .logo i { margin-right: 8px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #ccc; text-decoration: none; font-family: var(--font-mono); font-size: 0.85rem; transition: all 0.3s ease; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-glow); }
        .nav-cta { border: 1px solid var(--accent-glow); padding: 0.5rem 1.2rem; border-radius: 4px; background: var(--accent-glow); color: #000 !important; }
        .menu-toggle { display: none; font-size: 1.5rem; color: var(--accent-glow); cursor: pointer; background: none; border: none; }
        .view-container { width: 100%; max-width: 680px; margin-top: 80px; }
        .terminal-container { background: #050505; border: 2px solid #00ff9d; box-shadow: 0 0 30px rgba(0,255,157,0.25); border-radius: 0; width: 100%; }
        .terminal-header { background: #00ff9d; color: #000; padding: 10px 20px; font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; background: #00ff9d; border-radius: 50%; box-shadow: 0 0 8px #00ff9d; animation: pulseDot 1.5s infinite; }
        @keyframes pulseDot { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
        .terminal-body { padding: 2rem; }
        .field { margin-bottom: 1.5rem; }
        .field label { display: block; color: #00ff9d; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        .field input, .field select, .field textarea { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e0e0e0; padding: 12px 14px; font-family: var(--font-mono); font-size: 0.85rem; outline: none; }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: #00ff9d; box-shadow: 0 0 12px rgba(0,255,157,0.2); }
        .initiate-btn { width: 100%; background: transparent; border: 1.5px solid #00ff9d; color: #00ff9d; padding: 14px; font-family: var(--font-mono); font-weight: 700; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
        .initiate-btn:hover:not(:disabled) { background: #00ff9d; color: #000; box-shadow: 0 0 28px #00ff9d; }
        .initiate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000f0; backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .decrypt-box { border: 1px solid #00ff9d; padding: 2rem; background: #030303; text-align: center; max-width: 500px; width: 90%; }
        .decrypt-progress { width: 100%; height: 3px; background: #1a2a1a; margin: 1.5rem 0; overflow: hidden; }
        .decrypt-bar { width: 0%; height: 100%; background: #00ff9d; transition: width 0.1s linear; }
        .success-screen { background: #050505; border: 2px solid #00ff9d; padding: 2.5rem 2rem; text-align: center; animation: fadeIn 0.5s; }
        .success-title { font-size: clamp(1.8rem,6vw,2.5rem); font-weight: 800; color: #fff; text-shadow: 3px 3px 0px #ff0055, -2px -2px 0px #00ff9d; margin-bottom: 1.5rem; }
        .data-dump { color: #00ff9d; font-size: 0.8rem; margin: 1.5rem 0; line-height: 1.8; text-align: left; background: #0a0a0a; padding: 1.2rem; border-left: 3px solid #00ff9d; }
        .progress-bar-container { width: 100%; height: 6px; background: #1f2a1f; margin: 1.5rem 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #00ff9d; animation: fillProgress 1.5s ease-out forwards; }
        @keyframes fillProgress { to { width: 100%; } }
        .back-btn { background: transparent; border: 1.5px solid #00ff9d; color: #00ff9d; padding: 12px 28px; font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
        .back-btn:hover { background: #00ff9d; color: #000; box-shadow: 0 0 20px #00ff9d; }
        .hidden { display: none; }
        .field-error { border-color: #ff0055 !important; animation: shake 0.3s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { body { padding: 1rem; } .menu-toggle { display: block; } .nav-links { display: none; width: 100%; flex-direction: column; gap: 1rem; padding: 1rem 0; margin-top: 1rem; border-top: 1px solid rgba(0,255,157,0.2); } .nav-links.show { display: flex; } .terminal-body { padding: 1.5rem; } }

</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-shield-haltered"></i> REVENUE_ARCHITECT</a>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">HOME</a>

                <a href="initiate.html" class="nav-cta">INITIATE PROTOCOL</a>

    <div class="view-container" id="appContainer">
        <div id="terminalView">
            <div class="terminal-container">
                <div class="terminal-header"><span class="status-dot"></span> [SYSTEM-ID: REVENUE-ARCHITECT-01] // SECURE ACCESS PORTAL</div>
                <div class="terminal-body">
                    <form id="protocol-form" action="https://formspree.io/f/xbdpgrwr" method="POST">
                        <div class="field"><label>LOG_IDENTITY:</label><input type="text" id="fullName" name="full_name" placeholder="FULL_NAME" required></div>
                        <div class="field"><label>LOG_COMMUNICATION:</label><input type="email" id="email" name="email" placeholder="CORPORATE_EMAIL" required></div>
                        <div class="field"><label>TARGET_VERTICAL:</label><select id="vertical" name="target_vertical"><option value="B2B_SAAS">B2B_SAAS</option><option value="CLINICAL">HIGH_MARGIN_SURGICAL</option></select></div>
                        <div class="field"><label>SYSTEM_VULNERABILITY:</label><textarea id="vulnerability" name="vulnerability" rows="2" placeholder="DESCRIBE_LEAD_DECAY_SYMPTOMS"></textarea></div>
                        <input type="text" name="_gotcha" style="display:none">
                        <button type="submit" class="initiate-btn" id="executeBtn">[ EXECUTE_PROTOCOL ]</button>
                    </form>
                </div>
            </div>
        </div>
        <div id="successView" class="hidden">
            <div class="success-screen"><h1 class="success-title">PROTOCOL SUCCESSFUL</h1><div class="data-dump" id="dataDump"><p>> HANDSHAKE ESTABLISHED</p><p>> 72-HOUR NURTURE ENGINE: ACTIVATED</p><p>> EXPECT FIRST DATA PACKET IN < 4 HOURS</p></div><div class="progress-bar-container"><div class="progress-fill"></div></div><button class="back-btn" id="returnToBaseBtn">[ RETURN_TO_BASE ]</button></div>
        </div>
    </div>

    <script>
        const terminalView = document.getElementById('terminalView'), successView = document.getElementById('successView'), form = document.getElementById('protocol-form'), executeBtn = document.getElementById('executeBtn');
        function showDecryptAnimation() { return new Promise((resolve) => { let overlay = document.createElement('div'); overlay.className = 'loading-overlay'; overlay.innerHTML = `<div class="decrypt-box"><div style="color:#00ff9d;">⚡ PROTOCOL_AUTHENTICATION</div><div class="decrypt-progress"><div class="decrypt-bar" id="decryptBar"></div></div><div id="decryptMsg">HANDSHAKE_INITIATED...</div></div>`; document.body.appendChild(overlay); let progress = 0, bar = overlay.querySelector('#decryptBar'), msg = overlay.querySelector('#decryptMsg'); let interval = setInterval(() => { progress += Math.random() * 15 + 5; if (progress >= 100) { clearInterval(interval); bar.style.width = '100%'; msg.innerHTML = 'HANDSHAKE_COMPLETE'; setTimeout(() => { overlay.remove(); resolve(); }, 600); } else { bar.style.width = progress + '%'; if (progress > 50) msg.innerHTML = 'ENCRYPTING_DATA_STREAMS...'; } }, 90); }); }
        function showTerminalError(msg) { let div = document.createElement('div'); div.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff0055;color:#000;padding:10px 20px;font-family:monospace;font-size:0.75rem;z-index:3000;border-radius:4px;'; div.innerHTML = `⚠️ ${msg}`; document.body.appendChild(div); setTimeout(() => div.remove(), 3000); }
        form.addEventListener('submit', async (e) => { e.preventDefault(); let name = document.getElementById('fullName').value.trim(), email = document.getElementById('email').value.trim(); if (!name) { showTerminalError("LOG_IDENTITY required"); return; } if (!email || !email.includes('@')) { showTerminalError("Valid LOG_COMMUNICATION required"); return; } executeBtn.disabled = true; executeBtn.textContent = '[ PROCESSING... ]'; try { let fd = new FormData(form); let res = await fetch('https://formspree.io/f/xbdpgrwr', { method: 'POST', body: fd, headers: { 'Accept': 'application/json' } }); if (res.ok) { await showDecryptAnimation(); terminalView.classList.add('hidden'); successView.classList.remove('hidden'); let dataDiv = document.getElementById('dataDump'); if (dataDiv) dataDiv.innerHTML = `<p>> IDENTITY: ${name.toUpperCase()}</p><p>> COMMUNICATION: ${email.replace(/(.{2})(.*)(@)/,'$1***$3')}</p><p>> 72-HOUR NURTURE ENGINE: ACTIVATED</p><p>> ZERO-TRUST INTAKE: DEPLOYED</p><p>> EXPECT FIRST DATA PACKET IN < 4 HOURS</p>`; } else { showTerminalError("Submission failed. Retry."); executeBtn.disabled = false; executeBtn.textContent = '[ EXECUTE_PROTOCOL ]'; } } catch(err) { showTerminalError("Network error. Check connection."); executeBtn.disabled = false; executeBtn.textContent = '[ EXECUTE_PROTOCOL ]'; } });
        document.getElementById('returnToBaseBtn')?.addEventListener('click', () => { successView.classList.add('hidden'); terminalView.classList.remove('hidden'); form.reset(); executeBtn.disabled = false; executeBtn.textContent = '[ EXECUTE_PROTOCOL ]'; });
        const menuToggle = document.getElementById('menuToggle'), navLinks = document.getElementById('navLinks'); if(menuToggle) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
    </script>
