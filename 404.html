<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Fabian Molokwu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            padding: 2rem;
        }
        
        h1 {
            font-size: 6rem;
            color: #00ff9d;
            margin-bottom: 1rem;
        }
        
        p {
            color: #888;
            margin-bottom: 2rem;
        }
        
        a {
            color: #00ff9d;
            text-decoration: none;
            border: 1px solid #00ff9d;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        a:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Page not found. The protocol you're looking for doesn't exist.</p>
        <a href="/">Return to Home</a>
    </div>
</body>
