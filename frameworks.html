    <script>
        const frameworks = [
            { name: "PAS", title: "The Pain Diagnostic", desc: "Identify Problem, Agitate hidden costs, deploy Solution.", mission: "To solve a high-margin bottleneck, we simulate the cost of the status quo. PAS identifies the Problem, Agitates the financial hemorrhage, and deploys the Solution as system recovery." },

            { name: "AIDA", title: "The Attention Architecture", desc: "Capture Attention via AEO, build Interest, incite Desire, force Action.", mission: "Engineering high-intent engagement through cognitive layers. Capture Attention via AEO, build Interest, incite Desire via scarcity, force Action through Secure Intake Gate." },
            { name: "4Qs", title: "The Strategic Filter", desc: "Outcome, Alignment, Immediacy, Responsibility.", mission: "What is the Outcome? How does it Add Up? Is timing Immediate? Who is Responsible? If a change doesn't pass the 4Qs, it isn't deployed." },

        function renderFrameworks() {
            const container = document.getElementById('frameworksGrid');

            container.innerHTML = frameworks.map(f => `<div class="framework-card"><span class="framework-badge"><i class="fas fa-microchip"></i> ${f.name}</span><h2>${f.title}</h2><div class="framework-desc">${f.desc}</div><div class="cmd-text"><i class="fas fa-scroll"></i> MISSION LOG: ${f.mission.substring(0,120)}${f.mission.length>120?'...':''}</div></div>`).join('');
        }
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if(menuToggle) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
        renderFrameworks();
